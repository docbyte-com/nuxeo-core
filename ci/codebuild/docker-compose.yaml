version: "3.8"
x-aws-vpc: vpc-0ef4507096a9a9b8b
services:
  mongodb:
    image: mongo
    healthcheck:
      test: echo 'db.stats().ok' | mongo localhost:27017/zenbrain --quiet
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - 27017:27017
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2048M"
  opensearch:
    image: opensearchproject/opensearch:1
    environment:
      - discovery.type=single-node
      - cluster.name=docker-cluster
      - node.name=opensearch-node1
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - 9200:9200
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1024M"
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1024M"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
      - 29092:29092
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2048M"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 100
      KAFKA_LOG_RETENTION_MINUTES: 20
      KAFKA_OFFSETS_RETENTION_MINUTES: 20
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 5
      KAFKA_STATE_LOG_REPLICATION_FACTOR: 1
  redis:
    image: redis:latest
    ports:
      - 6379:6379
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "512M"
